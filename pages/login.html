<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="header">
    <h2>⚾ BallTalk</h2>
</header>

<main class="login-container">

    <h1>로그인</h1>
    <p class="login-subtitle">
        KBO 팬 커뮤니티에 오신 것을 환영합니다.
    </p>

    <label for="email">이메일</label>
    <input
            id="email"
            type="email"
            placeholder="이메일을 입력하세요"
    >
    <p id="emailHelperText" class="helper-text"></p>

    <label for="password">비밀번호</label>
    <input
            id="password"
            type="password"
            placeholder="비밀번호를 입력하세요"
    >
    <p id="passwordHelperText" class="helper-text"></p>

    <button id="loginButton">
        로그인
    </button>

    <p class="signup-guide">
            계정이 없으신가요?
            <span class="signup-link" id="signupButton">회원가입</span>
        </p>

</main>

<script src="../js/login.js"></script>

</body>
</html>
