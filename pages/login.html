    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>로그인</title>

        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>
        <header class="header">
            <h2>아무 말 대잔치</h2>
        </header>

        <main class="login-container">
            <h1>로그인</h1>

            <label for="email">이메일</label>
            <input
                type="email"
                id="email"
                placeholder="이메일을 입력하세요"
            />
            <p id="emailHelperText" class="helper-text"></p>

            <label for="password">비밀번호</label>
            <input
                type="password"
                id="password"
                placeholder="비밀번호를 입력하세요"
            />
            <p id="passwordHelperText" class="helper-text"></p>

            <button id="loginButton">로그인</button>

            <p id="signupButton">회원가입</p>
        </main>

        <script src="../js/login.js"></script>
    </body>
    </html>
