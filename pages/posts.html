<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인화면</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="header">

    <h2>⚾ BallTalk</h2>

    <div class="profile-menu-wrapper">

        <div class="profile-image" id="profileImage"></div>

        <div class="profile-dropdown" id="profileDropdown">
            <button id="editProfileMenu">회원정보수정</button>
            <button id="editPasswordMenu">비밀번호수정</button>
            <button id="logoutButton">로그아웃</button>
        </div>

    </div>

</header>


<main class="posts-container">


    <!-- 인기글 -->
    <section class="popular-section">

        <div class="section-header">
            <h2>🔥 내 응원팀 인기글</h2>
            <a href="#">더보기 ></a>
        </div>


        <div class="popular-list">

            <article class="preview-card">

                <h3>
                    삼성
                </h3>

                <div class="preview-info">
                    <span>❤️ 52</span>
                    <span>💬 18</span>
                </div>

            </article>


            <article class="preview-card">

                <h3>
                    1등
                </h3>

                <div class="preview-info">
                    <span>❤️ 41</span>
                    <span>💬 12</span>
                </div>

            </article>


            <article class="preview-card">

                <h3>
                    레전드
                </h3>

                <div class="preview-info">
                    <span>❤️ 37</span>
                    <span>💬 9</span>
                </div>

            </article>

        </div>

    </section>



    <!-- 최신글 -->
    <section class="recent-section">

        <div class="section-header">
            <h2>🆕 내 응원팀 최신글</h2>
            <a href="#">더보기 ></a>
        </div>


        <div class="recent-list">


            <article class="preview-card">

                <h3>
                    1
                </h3>

                <div class="preview-info">
                    <span>⏰ 2분 전</span>
                </div>

            </article>


            <article class="preview-card">

                <h3>
                    2
                </h3>

                <div class="preview-info">
                    <span>⏰ 8분 전</span>
                </div>

            </article>


            <article class="preview-card">

                <h3>
                    3
                </h3>

                <div class="preview-info">
                    <span>⏰ 20분 전</span>
                </div>

            </article>


        </div>

    </section>




    <!-- 팀 게시판 -->

    <section class="team-section">

        <h2>⚾ 팀 게시판</h2>


        <div class="team-tabs">

            <button class="active">전체</button>
            <button>LG</button>
            <button>KIA</button>
            <button>삼성</button>
            <button>롯데</button>
            <button>한화</button>
            <button>KT</button>
            <button>SSG</button>
            <button>두산</button>
            <button>NC</button>
            <button>키움</button>

        </div>

    </section>




    <button id="writeButton">
        게시글 작성
    </button>



    <section id="postList" class="post-list">

    </section>



    <div class="pagination">

        <button id="prevButton">이전</button>
        <button id="nextButton">다음</button>

    </div>


</main>


<script src="../js/posts.js"></script>

</body>
</html>
