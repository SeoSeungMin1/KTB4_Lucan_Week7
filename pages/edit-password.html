<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 수정</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">
    <button id="backButton" class="back-button">&lt;</button>

    <h2>⚾ BallTalk</h2>

    <div class="profile-menu-wrapper">
        <div class="profile-image" id="profileImage"></div>

        <div class="profile-dropdown" id="profileDropdown">
            <button type="button" id="editProfileMenu">회원정보 수정</button>
            <button type="button" id="editPasswordMenu">비밀번호 수정</button>
            <button type="button" id="logoutButton">로그아웃</button>
        </div>
    </div>
</header>

<main class="edit-password-main">

    <h1 class="edit-password-title">비밀번호 수정</h1>

    <form class="edit-password-form">

        <label for="currentPassword">현재 비밀번호</label>

        <input
            type="password"
            id="currentPassword"
            placeholder="현재 비밀번호를 입력하세요"
        >

        <p class="helper-text" id="currentPasswordHelper"></p>

        <label for="password">새 비밀번호</label>

        <input
            type="password"
            id="password"
            placeholder="새 비밀번호를 입력하세요"
        >

        <p class="helper-text" id="passwordHelper"></p>

        <label for="passwordConfirm">새 비밀번호 확인</label>

        <input
            type="password"
            id="passwordConfirm"
            placeholder="비밀번호를 한 번 더 입력하세요"
        >

        <p class="helper-text" id="passwordConfirmHelper"></p>

        <button
            type="button"
            id="passwordSubmitButton"
        >
            비밀번호 변경
        </button>

    </form>

    <div class="toast" id="toast">
        비밀번호가 변경되었습니다.
    </div>

</main>

<script src="../js/edit-password.js"></script>

</body>
</html>
