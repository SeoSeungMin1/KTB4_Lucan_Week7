<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="header">
    <button id="backButton" class="back-button">&lt;</button>

    <h2>⚾ BallTalk</h2>

    <div class="profile-menu-wrapper">
        <div class="profile-image" id="profileImage"></div>

        <div class="profile-dropdown" id="profileDropdown">
            <button type="button" id="editProfileMenu">회원정보수정</button>
            <button type="button" id="editPasswordMenu">비밀번호수정</button>
            <button type="button" id="logoutButton">로그아웃</button>
        </div>
    </div>
</header>

<main class="post-create-container">

    <h2 class="page-title">
        게시글 작성
    </h2>


    <form class="post-create-form">


        <!-- 제목 -->
        <label for="title">
            제목
        </label>

        <input
            type="text"
            id="title"
            placeholder="제목을 입력해주세요."
        >

        <p id="titleHelper" class="helper-text"></p>



        <!-- 내용 -->
        <label for="content">
            내용
        </label>

        <textarea
            id="content"
            placeholder="내용을 입력해주세요."
        ></textarea>

        <p id="contentHelper" class="helper-text"></p>



        <!-- 응원팀 -->
        <label for="team">
            응원팀
        </label>

        <select id="team">

            <option value="">
                팀을 선택해주세요
            </option>

            <option value="LG">
                LG 트윈스
            </option>

            <option value="KIA">
                KIA 타이거즈
            </option>

            <option value="삼성">
                삼성 라이온즈
            </option>

            <option value="롯데">
                롯데 자이언츠
            </option>

            <option value="한화">
                한화 이글스
            </option>

            <option value="KT">
                KT 위즈
            </option>

            <option value="SSG">
                SSG 랜더스
            </option>

            <option value="두산">
                두산 베어스
            </option>

            <option value="NC">
                NC 다이노스
            </option>

            <option value="키움">
                키움 히어로즈
            </option>

        </select>

        <p id="teamHelper" class="helper-text"></p>



        <!-- 이미지 -->
        <div class="image-upload">

            <label for="imageInput">
                이미지
            </label>

            <input
                type="file"
                id="imageInput"
                accept="image/*"
            >

        </div>



        <!-- 작성 버튼 -->
        <button
            type="button"
            id="submitButton">
            작성하기
        </button>


    </form>

</main>

<script src="../js/post-create.js"></script>

</body>

</html>
