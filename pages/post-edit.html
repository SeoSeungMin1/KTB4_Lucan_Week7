<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page-wrapper">

    <header class="header">
        <button id="backButton" class="back-button">&lt;</button>

        <h2>아무 말 대잔치</h2>
        
        <div class="profile-menu-wrapper">
        <div class="profile-image" id="profileImage"></div>

        <div class="profile-dropdown" id="profileDropdown">
            <button id="editProfileMenu">회원정보수정</button>
            <button id="editPasswordMenu">비밀번호수정</button>
            <button id="logoutButton">로그아웃</button>
        </div>
    </div>
    </header>

    <main class="edit-main">
        <h2 class="edit-title">게시글 수정</h2>

        <form class="edit-form">
            <label for="title">제목*</label>
            <input type="text" id="title" value="">

            <label for="content">내용*</label>
            <textarea id="content" placeholder=""></textarea>

            <p class="helper-text">* helper text</p>

            <div class="image-box">
                <label for="imageInput">이미지</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <button type="button" id="editSubmitButton">수정하기</button>
        </form>
    </main>

</div>

<script src="../js/post-edit.js"></script>
</body>
</html>
