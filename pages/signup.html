<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header class="header">
        <button id="backButton" class="back-button">&lt;</button>
        <h2>⚾ BallTalk</h2>
    </header>
    
    <main class="signup-container">

        <h1>회원가입</h1>
        <p class="signup-subtitle">
            KBO 팬들을 위한 커뮤니티
        </p>
        <div class="profile-section">
            <label>프로필 사진</label>
            <p id="profileHelperText" class="helper-text"></p>

            <div class="profile-circle">
                +
            </div>
        </div>

        <label for="email">이메일*</label>
        <input
                id="email"
                type="email"
                placeholder="이메일을 입력하세요"
        >
        <p id="emailHelperText" class="helper-text"></p>

        <label for="password">비밀번호*</label>
        <input
                id="password"
                type="password"
                placeholder="비밀번호를 입력하세요"
        >
        <p id="passwordHelperText" class="helper-text"></p>

        <label for="passwordConfirm">비밀번호 확인*</label>
        <input
                id="passwordConfirm"
                type="password"
                placeholder="비밀번호를 한번 더 입력하세요"
        >
        <p id="passwordConfirmHelperText" class="helper-text"></p>

        <label for="nickname">닉네임*</label>
        <input
                id="nickname"
                type="text"
                placeholder="닉네임을 입력하세요"
        >
        <p id="nicknameHelperText" class="helper-text"></p>

        <label for="favoriteTeam">응원팀*</label>

        <select id="favoriteTeam">
            <option value="">응원팀을 선택하세요</option>
            <option value="LG">LG 트윈스</option>
            <option value="KIA">KIA 타이거즈</option>
            <option value="SAMSUNG">삼성 라이온즈</option>
            <option value="LOTTE">롯데 자이언츠</option>
            <option value="HANWHA">한화 이글스</option>
            <option value="KT">KT 위즈</option>
            <option value="SSG">SSG 랜더스</option>
            <option value="DOOSAN">두산 베어스</option>
            <option value="NC">NC 다이노스</option>
            <option value="KIWOOM">키움 히어로즈</option>
        </select>

        <p id="favoriteTeamHelperText" class="helper-text"></p>

        <button id="signupButton">
            회원가입
        </button>

        <p class="login-guide">
            이미 계정이 있으신가요?
            <span id="loginText">로그인하기</span>
        </p>

        <div id="signupToast" class="signup-toast">회원가입 성공</div>

    </main>

    <script src="../js/signup.js"></script>

</body>
</html>
